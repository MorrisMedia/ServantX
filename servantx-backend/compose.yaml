services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-servantx}
      POSTGRES_USER: ${POSTGRES_USER:-servantx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-servantx} -d ${POSTGRES_DB:-servantx}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  create-bucket:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done &&
      /usr/bin/mc mb --ignore-existing local/${STORAGE_BUCKET:-servantx-artifacts} &&
      /usr/bin/mc anonymous set download local/${STORAGE_BUCKET:-servantx-artifacts} || true
      "

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_ROLE: api
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-servantx}
      POSTGRES_USER: ${POSTGRES_USER:-servantx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-servantx}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-servantx}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENABLE_CELERY_ASYNC: "true"
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      STORAGE_ROOT: /app/uploads
      DUCKDB_WORKSPACE_ROOT: /app/uploads/workspaces
      STORAGE_BUCKET: ${STORAGE_BUCKET:-servantx-artifacts}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL:-http://minio:9000}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-${MINIO_ROOT_USER:-minioadmin}}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}
    volumes:
      - servantx_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_ROLE: worker
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-servantx}
      POSTGRES_USER: ${POSTGRES_USER:-servantx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-servantx}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-servantx}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENABLE_CELERY_ASYNC: "true"
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      STORAGE_ROOT: /app/uploads
      DUCKDB_WORKSPACE_ROOT: /app/uploads/workspaces
      STORAGE_BUCKET: ${STORAGE_BUCKET:-servantx-artifacts}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL:-http://minio:9000}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-${MINIO_ROOT_USER:-minioadmin}}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}
    volumes:
      - servantx_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
  minio_data:
  servantx_uploads:
