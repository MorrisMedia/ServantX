name: Deploy ServantX Backend

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: asaasin/servantx-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Set up Kubeconfig
        run: |
          export KUBECONFIG=/home/github/.kube/config
      - name: Sync files to deployment directory
        run: |
          mkdir -p /home/github/k8s-shared-services
          cp -f ${{ github.workspace }}/servantx.yaml /home/github/k8s-shared-services/
          cp -f ${{ github.workspace }}/servantx.env /home/github/k8s-shared-services/ || true
      - name: Update Kubernetes secret
        working-directory: /home/github/k8s-shared-services
        run: |
          kubectl delete secret servantx-shared-secret || true
          kubectl create secret generic servantx-shared-secret --from-env-file=servantx.env
      - name: Deploy servantx-backend
        working-directory: /home/github/k8s-shared-services
        run: |
          kubectl apply -f servantx.yaml
          kubectl rollout restart deployment servantx-backend || true
