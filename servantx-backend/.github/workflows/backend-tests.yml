name: Backend Tests

on:
  push:
    paths:
      - "**/*.py"
      - "requirements.txt"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "**/*.py"
      - "requirements.txt"
      - ".github/workflows/backend-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run golden repricing tests
        run: pytest tests/test_repricing_golden.py
